name: Deploy Production

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:  # allows manual trigger for key sync / emergency deploy

concurrency:
  group: deploy-prod
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy:
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main') }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0  # need full history for git describe

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24.1'

      - name: Build linux binary
        run: |
          set -euo pipefail
          VERSION=$(git describe --tags --always --dirty)
          echo "Building $VERSION"
          CGO_ENABLED=1 GOOS=linux GOARCH=amd64 go build \
            -ldflags="-X github.com/nullbore/nullbore-server/internal/api.ServerVersion=$VERSION" \
            -o nullbore-server ./cmd/server

      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.NB_PROD_SSH_KEY }}

      - name: Add host key
        env:
          PROD_HOST: ${{ secrets.NB_PROD_HOST }}
          PROD_PORT: ${{ secrets.NB_PROD_PORT }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          ssh-keyscan -p "${PROD_PORT:-22}" -H "$PROD_HOST" >> ~/.ssh/known_hosts

      - name: Sync SSH authorized keys
        env:
          PROD_HOST: ${{ secrets.NB_PROD_HOST }}
          PROD_USER: ${{ secrets.NB_PROD_USER }}
          PROD_PORT: ${{ secrets.NB_PROD_PORT }}
        run: |
          set -euo pipefail
          : "${PROD_HOST:?}" ; : "${PROD_USER:?}"

          # Upload the canonical key list from the repo and merge with
          # whatever is already in authorized_keys (preserving the deploy
          # key and any manually-added keys). Dedup with sort -u so
          # repeated deploys don't bloat the file.
          scp -P "${PROD_PORT:-22}" .github/authorized-keys \
            "$PROD_USER@$PROD_HOST:/tmp/nb-authorized-keys"

          ssh -p "${PROD_PORT:-22}" "$PROD_USER@$PROD_HOST" <<'KEYSEOF'
          set -euo pipefail
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          touch ~/.ssh/authorized_keys
          # Strip comments + blank lines from the repo file, merge, dedup
          grep -v '^#' /tmp/nb-authorized-keys | grep -v '^$' >> ~/.ssh/authorized_keys
          sort -u -o ~/.ssh/authorized_keys ~/.ssh/authorized_keys
          chmod 600 ~/.ssh/authorized_keys
          echo "authorized_keys: $(wc -l < ~/.ssh/authorized_keys) keys"
          rm /tmp/nb-authorized-keys
          KEYSEOF

      - name: Deploy to tunnel server
        env:
          PROD_HOST: ${{ secrets.NB_PROD_HOST }}
          PROD_USER: ${{ secrets.NB_PROD_USER }}
          PROD_PORT: ${{ secrets.NB_PROD_PORT }}
          PROD_HEALTH_URL: ${{ secrets.NB_PROD_HEALTH_URL }}
        run: |
          set -euo pipefail
          : "${PROD_HOST:?NB_PROD_HOST is required}"
          : "${PROD_USER:?NB_PROD_USER is required}"

          scp -P "${PROD_PORT:-22}" ./nullbore-server "$PROD_USER@$PROD_HOST:/usr/local/bin/nullbore-server.new"

          ssh -p "${PROD_PORT:-22}" "$PROD_USER@$PROD_HOST" <<'EOF'
          set -euo pipefail
          chmod +x /usr/local/bin/nullbore-server.new
          mv /usr/local/bin/nullbore-server.new /usr/local/bin/nullbore-server
          systemctl restart nullbore-server
          systemctl is-active --quiet nullbore-server
          EOF

          HEALTH_URL="${PROD_HEALTH_URL:-https://tunnel.nullbore.com/health}"
          # Verify the live server actually serves the version we just built —
          # catches "deploy said success but the binary didn't swap" failures.
          EXPECTED_VERSION=$(git describe --tags --always --dirty)
          LIVE_RESPONSE=$(curl -fsS "$HEALTH_URL")
          echo "Health response: $LIVE_RESPONSE"
          if ! echo "$LIVE_RESPONSE" | grep -q "\"version\":\"$EXPECTED_VERSION\""; then
            echo "::error::Live server version mismatch — expected $EXPECTED_VERSION"
            echo "::error::Got: $LIVE_RESPONSE"
            exit 1
          fi
          echo "✅ Live server version matches: $EXPECTED_VERSION"

      - name: Deploy summary
        run: echo "✅ Production deploy complete" >> "$GITHUB_STEP_SUMMARY"
