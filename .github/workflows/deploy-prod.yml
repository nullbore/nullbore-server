name: Deploy Tunnel Server

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-tunnel
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    needs: []

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Install cross-compilation deps
        run: sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build server binary
        run: |
          set -euo pipefail
          VERSION=$(git describe --tags --always --dirty)
          CGO_ENABLED=1 GOOS=linux GOARCH=amd64 go build \
            -ldflags="-s -w -X github.com/nullbore/nullbore-server/internal/api.ServerVersion=$VERSION" \
            -o nullbore-server ./cmd/server

      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.NB_TUNNEL_SSH_KEY }}

      - name: Add host key
        env:
          TUNNEL_HOST: ${{ secrets.NB_TUNNEL_HOST }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          ssh-keyscan -H "$TUNNEL_HOST" >> ~/.ssh/known_hosts

      - name: Deploy server binary
        env:
          TUNNEL_HOST: ${{ secrets.NB_TUNNEL_HOST }}
          TUNNEL_USER: ${{ secrets.NB_TUNNEL_USER }}
        run: |
          set -euo pipefail
          : "${TUNNEL_HOST:?}" ; : "${TUNNEL_USER:?}"

          scp ./nullbore-server \
            "$TUNNEL_USER@$TUNNEL_HOST:/usr/local/bin/nullbore-server.new"

          ssh "$TUNNEL_USER@$TUNNEL_HOST" <<'EOF'
          set -euo pipefail
          chmod +x /usr/local/bin/nullbore-server.new
          mv /usr/local/bin/nullbore-server.new /usr/local/bin/nullbore-server
          systemctl restart nullbore-server
          sleep 2
          systemctl is-active --quiet nullbore-server
          EOF

          # Health check
          HEALTH_URL="${TUNNEL_HEALTH_URL:-https://tunnel.nullbore.com/health}"
          curl -fsS "$HEALTH_URL" || echo "::warning::Health check failed (may need manual verification)"

      - name: Deploy summary
        run: echo "✅ Tunnel server deploy complete" >> "$GITHUB_STEP_SUMMARY"
